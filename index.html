<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title data-app-name>My APK Builder</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
    }
    .controls {
      padding: 12px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .controls input, .controls button {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .controls button {
      background: #1a73e8;
      color: white;
      border: none;
      cursor: pointer;
    }
    .container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .left, .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid #ddd;
    }
    .left { background: #fff; }
    .right { background: #fafafa; }
    .editor-header {
      padding: 10px;
      background: #f0f0f0;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }
    textarea {
      flex: 1;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      padding: 12px;
      border: none;
      resize: none;
      outline: none;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    #preview-info {
      padding: 10px;
      background: #e3f2fd;
      text-align: center;
      font-size: 0.9rem;
    }
    .status {
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: bold;
    }
    .published { background: #d4edda; color: #155724; }
    .unpublished { background: #f8d7da; color: #721c24; }
    #updateBanner {
      display: none;
      background: #fff3cd;
      color: #856404;
      padding: 12px;
      margin: 12px;
      border-radius: 6px;
      text-align: center;
    }
    #nativeInfo {
      font-size: 0.85rem;
      color: #555;
      text-align: center;
      padding: 8px;
      background: #e9ecef;
    }
  </style>
</head>
<body>

<header>
  <h2 id="appTitleHeader">APK Builder Sederhana</h2>
  <span class="status unpublished" id="publishStatus">Unpublished</span>
</header>

<div class="controls">
  <label>Nama Aplikasi:</label>
  <input type="text" id="appName" placeholder="Nama App" value="My Awesome App">

  <label>Icon:</label>
  <input type="file" id="iconUpload" accept="image/png,image/jpeg">

  <button onclick="togglePublish()">Toggle Publish</button>
  <button onclick="simulateUpdateCheck()">Cek Update</button>
  <button onclick="simulateDownload()">Download APK (simulasi)</button>
</div>

<div id="nativeInfo">Loading app info...</div>
<div id="updateBanner">
  <strong>Ada versi baru tersedia!</strong> 
  <button onclick="alert('Download & install update dari link/server')">Update Sekarang</button>
</div>

<div class="container">
  <div class="left">
    <div class="editor-header">Kode HTML + CSS + JS (Editor)</div>
    <textarea id="codeEditor" spellcheck="false">
<!-- Contoh kode awal - edit sesuka hati -->
<!DOCTYPE html>
<html>
<head>
  <title data-dynamic-title></title>
  <style>
    body { font-family: Arial; text-align: center; padding: 40px; background: linear-gradient(to bottom, #e0f7fa, #ffffff); }
    h1 { color: #0277bd; }
    button { padding: 12px 24px; font-size: 1.1rem; background: #0288d1; color: white; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Halo dari <span id="appTitle">My Awesome App</span>!</h1>
  <p>Ini aplikasi yang kamu buat sendiri 🚀</p>
  <button onclick="alert('Tombol dari preview ditekan!')">Klik aku</button>

  <script>
    console.log("Aplikasi berjalan di preview atau native!");
  </script>
</body>
</html>
    </textarea>
  </div>

  <div class="right">
    <div class="editor-header">Preview (mirip tampilan HP)</div>
    <div id="preview-info">
      Icon: <img id="iconPreview" style="width:28px;height:28px;border-radius:6px;vertical-align:middle;" src="" alt="Icon">
      • Nama: <strong id="previewName">My Awesome App</strong>
    </div>
    <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>

<script>
// ========== Variabel Global ==========
let iconBase64 = "";
let isPublished = false;
const CURRENT_VERSION = "1.0.0";   // Ganti saat ada update

const appNameInput = document.getElementById('appName');
const codeEditor   = document.getElementById('codeEditor');
const frame        = document.getElementById('previewFrame');
const iconPreview  = document.getElementById('iconPreview');
const previewName  = document.getElementById('previewName');
const publishStatus = document.getElementById('publishStatus');
const appTitleHeader = document.getElementById('appTitleHeader');

// ========== Live Preview ==========
function updatePreview() {
  let code = codeEditor.value;
  // Ganti judul dinamis
  code = code.replace(/<title data-dynamic-title>.*?<\/title>/, `<title>${appNameInput.value || "My App"}</title>`);
  code = code.replace(/<span id="appTitle">.*?<\/span>/g, `<span id="appTitle">${appNameInput.value || "My App"}</span>`);

  frame.srcdoc = code;
  previewName.textContent = appNameInput.value || "My App";
  appTitleHeader.textContent = appNameInput.value || "APK Builder Sederhana";
}

codeEditor.addEventListener('input', updatePreview);
appNameInput.addEventListener('input', updatePreview);

// ========== Upload Icon ==========
document.getElementById('iconUpload').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    iconBase64 = ev.target.result;
    iconPreview.src = iconBase64;
  };
  reader.readAsDataURL(file);
});

// ========== Publish Toggle ==========
function togglePublish() {
  isPublished = !isPublished;
  publishStatus.textContent = isPublished ? "Published" : "Unpublished";
  publishStatus.className = `status ${isPublished ? 'published' : 'unpublished'}`;
}

// ========== Simulasi Update (bisa diganti fetch ke server) ==========
async function simulateUpdateCheck() {
  if (!isPublished) {
    alert("Publish dulu!");
    return;
  }

  // Contoh: nanti fetch dari server
  // const res = await fetch('https://your-api/version.json');
  // const data = await res.json();
  // if (data.version > CURRENT_VERSION) { ... }

  // Simulasi
  const hasUpdate = Math.random() > 0.5; // acak untuk demo
  document.getElementById('updateBanner').style.display = hasUpdate ? 'block' : 'none';
  if (hasUpdate) {
    alert("Ada update! (demo)");
  } else {
    alert("Sudah versi terbaru.");
  }
}

// ========== Simulasi Download APK ==========
function simulateDownload() {
  if (!isPublished) {
    alert("Publish dulu sebelum download!");
    return;
  }
  const safeName = (appNameInput.value || "aplikasi").toLowerCase().replace(/[^a-z0-9]/g, '');
  alert(`Simulasi: Download ${safeName}-v${CURRENT_VERSION}.apk berhasil!\n\n(di real: hasil build dari Capacitor)`);
}

// ========== Deteksi Capacitor / Native Environment ==========
if (window.Capacitor) {
  document.getElementById('nativeInfo').innerHTML = `
    Running in Capacitor • Platform: ${Capacitor.getPlatform()} • Version: ${CURRENT_VERSION}
  `;
  // Contoh pakai Capacitor API
  Capacitor.App.getInfo().then(info => {
    console.log("App Info:", info);
  });
} else {
  document.getElementById('nativeInfo').textContent = "Running in Browser (preview mode)";
}

// Init
updatePreview();
</script>

</body>
</html>
