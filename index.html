<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Code Editor - HTML CSS JS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f0f11;
      color: #e0e0e0;
    }

    header {
      background: #1a1a1f;
      padding: 12px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
    }

    .container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .editor-area, .preview-area {
      flex: 1;
      height: 100%;
      border-right: 1px solid #333;
    }

    .editor-area {
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      background: #1e1e24;
      border-bottom: 1px solid #333;
    }

    .tab {
      padding: 10px 18px;
      cursor: pointer;
      user-select: none;
      border-right: 1px solid #333;
      background: #25252b;
      color: #aaa;
    }

    .tab.active {
      background: #2d2d35;
      color: #e0e0e0;
      border-bottom: 2px solid #4dabf7;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 16px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 15px;
      background: #1e1e24;
      color: #d4d4d4;
      border: none;
      resize: none;
      outline: none;
      line-height: 1.5;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }
      .editor-area, .preview-area {
        height: 50%;
        border-right: none;
        border-bottom: 1px solid #333;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Live Code Playground</h1>
  <div>HTML • CSS • JavaScript</div>
</header>

<div class="container">
  <!-- Editor kiri -->
  <div class="editor-area">
    <div class="tabs">
      <div class="tab active" data-lang="html">index.html</div>
      <div class="tab" data-lang="css">style.css</div>
      <div class="tab" data-lang="js">script.js</div>
    </div>

    <textarea id="htmlCode" placeholder="Tulis HTML di sini...">
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Hasil Preview</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Halo Dunia!</h1>
  <p>Ketik kode di sebelah kiri, hasilnya akan muncul di sini secara otomatis ✨</p>

  <button id="klik">Klik aku</button>

  <script src="script.js"></script>
</body>
</html>
    </textarea>

    <textarea id="cssCode" style="display:none;" placeholder="Tulis CSS di sini...">
body {
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: white;
  padding: 40px;
  text-align: center;
}

h1 {
  color: #60a5fa;
  margin-bottom: 1rem;
}

button {
  padding: 12px 28px;
  font-size: 1.1rem;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

button:hover {
  background: #2563eb;
  transform: translateY(-2px);
}
    </textarea>

    <textarea id="jsCode" style="display:none;" placeholder="Tulis JavaScript di sini...">
document.getElementById('klik').addEventListener('click', () => {
  alert('Yeay! Tombol berhasil diklik 🎉');
});
    </textarea>
  </div>

  <!-- Preview kanan -->
  <div class="preview-area">
    <iframe id="preview"></iframe>
  </div>
</div>

<script>
// Kode utama live preview
const html = document.getElementById('htmlCode');
const css = document.getElementById('cssCode');
const js = document.getElementById('jsCode');
const preview = document.getElementById('preview');
const tabs = document.querySelectorAll('.tab');

// Ganti tab
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    html.style.display = 'none';
    css.style.display = 'none';
    js.style.display = 'none';

    const lang = tab.dataset.lang;
    document.getElementById(lang + 'Code').style.display = 'block';
  });
});

// Update preview setiap kali ada perubahan
function updatePreview() {
  const content = `
    <!DOCTYPE html>
    <html>
    <head>
      <style>${css.value}</style>
    </head>
    <body>
      ${html.value}
      <script>${js.value}<\/script>
    </body>
    </html>
  `;

  preview.srcdoc = content;
}

// Jalankan update setiap ketik
[html, css, js].forEach(editor => {
  editor.addEventListener('input', updatePreview);
});

// Preview pertama kali dibuka
updatePreview();
</script>

</body>
</html>
