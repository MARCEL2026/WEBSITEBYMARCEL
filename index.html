<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APK Builder Sederhana - Buat Aplikasi Sendiri</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .left, .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid #ddd;
    }
    .left { background: #fff; }
    .right { background: #f8f9fa; }
    .editor-header {
      padding: 10px;
      background: #eee;
      font-weight: bold;
    }
    .controls {
      padding: 15px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }
    .controls label { margin-right: 10px; }
    .controls input, .controls button {
      margin: 5px 0;
      padding: 8px;
    }
    .editor {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    textarea {
      flex: 1;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      padding: 10px;
      border: none;
      resize: none;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    #preview-info {
      padding: 10px;
      background: #e3f2fd;
      text-align: center;
    }
    .status {
      padding: 8px 15px;
      font-weight: bold;
    }
    .published { background: #d4edda; color: #155724; }
    .unpublished { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

<header>
  <h2>APK Builder Sederhana v0.1</h2>
  <div>
    <span class="status unpublished" id="publishStatus">Unpublished</span>
  </div>
</header>

<div class="controls">
  <label>Nama Aplikasi:</label>
  <input type="text" id="appName" placeholder="Contoh: TikTok Baru" value="My Cool App">

  <label>Icon Aplikasi:</label>
  <input type="file" id="iconUpload" accept="image/*">

  <button onclick="togglePublish()">Toggle Published</button>
  <button onclick="checkForUpdate()">Cek Update di App</button>
  <button onclick="simulateDownloadAPK()">Download APK (simulasi)</button>
</div>

<div class="container">
  <div class="left">
    <div class="editor-header">Editor Kode (HTML + CSS + JS)</div>
    <div class="editor">
      <textarea id="codeEditor" placeholder="Tulis kode HTML + CSS + JS di sini...">
<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; }
    h1 { color: #1a73e8; }
  </style>
</head>
<body>
  <h1>Selamat Datang di <span id="appTitle">My Cool App</span>!</h1>
  <p>Ini adalah aplikasi pertama kamu.</p>

  <div id="updateBanner" style="display:none; background:#ffcc00; padding:15px; margin:20px;">
    <strong>Ada Update baru!</strong> Versi terbaru tersedia.
    <button onclick="installUpdate()">Update Sekarang</button>
  </div>

  <script>
    // Kode JS kamu bisa ditulis di sini
    console.log("Aplikasi berjalan!");
  </script>
</body>
</html>
      </textarea>
    </div>
  </div>

  <div class="right">
    <div class="editor-header">Preview Aplikasi (seperti di HP)</div>
    <div id="preview-info">
      Preview real-time • Icon: <img id="iconPreview" style="width:32px;height:32px;border-radius:8px;vertical-align:middle;" src="" alt="No icon">
      • Nama: <strong id="previewName">My Cool App</strong>
    </div>
    <iframe id="previewFrame"></iframe>
  </div>
</div>

<script>
// ========== Variabel global ==========
let iconBase64 = "";
let isPublished = false;

// ========== Live Preview ==========
const editor = document.getElementById("codeEditor");
const frame = document.getElementById("previewFrame");
const appNameInput = document.getElementById("appName");
const iconPreview = document.getElementById("iconPreview");
const previewName = document.getElementById("previewName");

function updatePreview() {
  const code = editor.value;
  frame.srcdoc = code.replace(
    /<span id="appTitle">.*?<\/span>/,
    `<span id="appTitle">${appNameInput.value || "My App"}</span>`
  );
  previewName.textContent = appNameInput.value || "My App";
}

editor.addEventListener("input", updatePreview);
appNameInput.addEventListener("input", updatePreview);

// ========== Upload Icon ==========
document.getElementById("iconUpload").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    iconBase64 = ev.target.result;
    iconPreview.src = iconBase64;
  };
  reader.readAsDataURL(file);
});

// ========== Published / Unpublished ==========
function togglePublish() {
  isPublished = !isPublished;
  const statusEl = document.getElementById("publishStatus");
  statusEl.textContent = isPublished ? "Published" : "Unpublished";
  statusEl.className = "status " + (isPublished ? "published" : "unpublished");
}

// ========== Simulasi Update ==========
function checkForUpdate() {
  if (!isPublished) {
    alert("Aplikasi belum dipublish!");
    return;
  }
  alert("Mengirim sinyal update ke semua pengguna...\n\nDi aplikasi nanti akan muncul banner update!");
  // Di dunia nyata: simpan version di server, app polling atau pakai Firebase
}

// ========== Simulasi Download APK ==========
function simulateDownloadAPK() {
  const name = (appNameInput.value || "aplikasi").toLowerCase().replace(/\s+/g, "") + ".apk";
  
  if (!isPublished) {
    alert("Publish dulu sebelum download APK!");
    return;
  }

  alert(
    `Simulasi Download APK berhasil!\n\n` +
    `Nama file: ${name}\n` +
    `Ukuran: ~8.2 MB\n` +
    `Icon digunakan: ${iconBase64 ? "Ya" : "Tidak"}\n\n` +
    `Di dunia nyata file .apk akan ter-download dan bisa diinstall.\n` +
    `(Saat ini hanya simulasi karena butuh server build)`
  );

  // Di dunia nyata → kirim ke backend → build → return link download
}

// Init
updatePreview();
</script>

</body>
</html>
