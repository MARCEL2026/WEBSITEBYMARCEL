
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Code Editor - Marcel</title>
  
  <!-- PWA manifest -->
  <link rel="manifest" href="data:application/manifest+json,{
    &quot;name&quot;: &quot;Mini Code Editor&quot;,
    &quot;short_name&quot;: &quot;CodeEdit&quot;,
    &quot;start_url&quot;: &quot;.&quot;,
    &quot;display&quot;: &quot;standalone&quot;,
    &quot;background_color&quot;: &quot;#111&quot;,
    &quot;theme_color&quot;: &quot;#0d6efd&quot;,
    &quot;icons&quot;: [
      {
        &quot;src&quot;: &quot;https://img.icons8.com/fluency/256/code.png&quot;,
        &quot;sizes&quot;: &quot;256x256&quot;,
        &quot;type&quot;: &quot;image/png&quot;,
        &quot;purpose&quot;: &quot;any maskable&quot;
      }
    ]
  }"/>
  
  <!-- Theme color & status bar -->
  <meta name="theme-color" content="#0d6efd"/>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', monospace;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    header {
      background: #1a1a1a;
      padding: 10px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    h1 {
      font-size: 1.4rem;
    }
    
    .container {
      flex: 1;
      display: flex;
    }
    
    .editor-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
    }
    
    .preview-section {
      flex: 1;
      background: white;
    }
    
    .tab-bar {
      background: #222;
      padding: 8px 12px;
      display: flex;
      gap: 2px;
    }
    
    .tab {
      background: #333;
      color: #aaa;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 4px 4px 0 0;
      user-select: none;
    }
    
    .tab.active {
      background: #0d6efd;
      color: white;
    }
    
    textarea {
      flex: 1;
      width: 100%;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      padding: 12px;
      font-family: 'Consolas', monospace;
      font-size: 15px;
      resize: none;
      outline: none;
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .editor-section {
        border-right: none;
        border-bottom: 1px solid #333;
      }
      .preview-section {
        height: 50vh;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Mini Code Editor</h1>
    <div>PWA ready • Install sekarang!</div>
  </header>

  <div class="container">
    <!-- Kiri: Editor -->
    <div class="editor-section">
      <div class="tab-bar">
        <div class="tab active" data-lang="html">HTML</div>
        <div class="tab" data-lang="css">CSS</div>
        <div class="tab" data-lang="js">JavaScript</div>
      </div>
      
      <textarea id="htmlCode" placeholder="Tulis HTML di sini..."><!DOCTYPE html>
<html>
<head>
  <title>Halo Dunia</title>
</head>
<body>
  <h1>Selamat datang!</h1>
  <p>Ketik sesuatu di sini...</p>
</body>
</html></textarea>
      
      <textarea id="cssCode" placeholder="Tulis CSS di sini..." style="display:none;">
body {
  font-family: Arial;
  text-align: center;
  padding: 40px;
  background: #f0f4ff;
}

h1 {
  color: #0066ff;
}</textarea>
      
      <textarea id="jsCode" placeholder="Tulis JavaScript di sini..." style="display:none;">
document.querySelector('h1').addEventListener('click', () => {
  alert('Keren ya editornya!');
});</textarea>
    </div>
    
    <!-- Kanan: Preview -->
    <div class="preview-section">
      <iframe id="preview"></iframe>
    </div>
  </div>

  <script>
    const html = document.getElementById('htmlCode');
    const css  = document.getElementById('cssCode');
    const js   = document.getElementById('jsCode');
    const preview = document.getElementById('preview').contentWindow.document;
    
    const tabs = document.querySelectorAll('.tab');
    const textareas = [html, css, js];
    
    // Tab switching
    tabs.forEach((tab, index) => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        textareas.forEach((ta, i) => {
          ta.style.display = i === index ? 'block' : 'none';
        });
      });
    });
    
    function runCode() {
      let code = `
        ${html.value}
        <style>${css.value}</style>
        <script>${js.value}<\/script>
      `;
      
      preview.open();
      preview.write(code);
      preview.close();
    }
    
    // Live update setiap ketik
    [html, css, js].forEach(editor => {
      editor.addEventListener('input', runCode);
    });
    
    // Jalankan pertama kali
    runCode();
    
    // ================= PWA install prompt =================
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Bisa tampilkan tombol install jika mau
      console.log("Aplikasi bisa diinstall!");
    });
    
    // Kalau mau tombol install manual (opsional)
    // document.getElementById('installBtn')?.addEventListener('click', async () => {
    //   if (deferredPrompt) {
    //     deferredPrompt.prompt();
    //     const { outcome } = await deferredPrompt.userChoice;
    //     if (outcome === 'accepted') console.log('User install app');
    //     deferredPrompt = null;
    //   }
    // });
  </script>
</body>
</html>
