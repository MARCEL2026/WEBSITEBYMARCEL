<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Code Editor → Buat PWA + Splash Preview</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0d1117;
      color: #e6edf3;
    }
    header {
      background: #161b22;
      padding: 12px 20px;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { font-size: 1.4rem; }
    .settings {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .settings label { font-size: 0.85rem; color: #8b949e; white-space: nowrap; }
    input[type=text], input[type=color], input[type=file] {
      padding: 8px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      width: 140px;
    }
    button {
      padding: 8px 16px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #2ea043; }
    #previewSplashBtn { background: #8957e5; }
    #previewSplashBtn:hover { background: #a37eff; }

    .container { flex:1; display:flex; overflow:hidden; }
    .editor-area, .preview-area { flex:1; height:100%; }
    .editor-area { border-right:1px solid #30363d; display:flex; flex-direction:column; }

    .tabs {
      display:flex;
      background:#161b22;
      border-bottom:1px solid #30363d;
    }
    .tab {
      padding:10px 18px;
      cursor:pointer;
      background:#0d1117;
      color:#8b949e;
      border-right:1px solid #30363d;
    }
    .tab.active {
      background:#21262d;
      color:#e6edf3;
      border-bottom:2px solid #58a6ff;
    }

    textarea {
      flex:1;
      width:100%;
      padding:16px;
      font-family: 'Consolas', monospace;
      font-size:15px;
      background:#0d1117;
      color:#c9d1d9;
      border:none;
      resize:none;
      outline:none;
    }

    iframe { width:100%; height:100%; border:none; background:white; }

    /* Splash Preview Modal */
    #splashPreview {
      position: fixed;
      inset: 0;
      background: var(--splash-bg, #000);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      font-size: 1.8rem;
      text-align: center;
      transition: opacity 0.6s;
    }
    #splashPreview img {
      max-width: 180px;
      max-height: 180px;
      object-fit: contain;
      margin-bottom: 2rem;
      border-radius: 30%;
    }
    #splashPreview.show { display: flex; opacity: 1; }

    @media (max-width:900px) {
      .container { flex-direction:column; }
      .editor-area, .preview-area { height:50%; border:none; border-bottom:1px solid #30363d; }
      header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <h1>Buat PWA + Preview Splash Screen</h1>
  <div class="settings">
    <label>Nama App:</label>
    <input type="text" id="appName" placeholder="Nama App" value="My Awesome App">

    <label>Icon (PNG/JPG min 512px):</label>
    <input type="file" id="appIcon" accept="image/png,image/jpeg">

    <label>Bg Splash:</label>
    <input type="color" id="bgColor" value="#000000">

    <label>Theme Color:</label>
    <input type="color" id="themeColor" value="#000000">

    <button id="previewSplashBtn">Preview Splash</button>
    <button id="downloadBtn">Download ZIP Aplikasi</button>
  </div>
</header>

<div class="container">
  <div class="editor-area">
    <div class="tabs">
      <div class="tab active" data-lang="html">index.html</div>
      <div class="tab" data-lang="css">style.css</div>
      <div class="tab" data-lang="js">script.js</div>
    </div>

    <textarea id="htmlCode">
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Awesome App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <!-- iOS splash screens akan ditambahkan otomatis saat download -->
</head>
<body>
  <h1>Selamat datang di app custom!</h1>
  <p>Install app ini ke home screen untuk pengalaman full seperti native app.</p>

  <button id="test">Tes Klik</button>

  <script src="script.js"></script>
</body>
</html>
    </textarea>

    <textarea id="cssCode" style="display:none;">
body {
  font-family: system-ui;
  background: linear-gradient(#0f0c29, #302b63, #24243e);
  color: white;
  min-height: 100vh;
  padding: 40px;
  text-align: center;
  margin: 0;
}
h1 { color: #00d4ff; }
button {
  padding: 12px 30px;
  font-size: 1.1rem;
  background: #00d4ff;
  color: #000;
  border: none;
  border-radius: 50px;
  cursor: pointer;
}
    </textarea>

    <textarea id="jsCode" style="display:none;">
document.getElementById('test').onclick = () => {
  alert('Aplikasi custom berjalan lancar! 🚀');
};
    </textarea>
  </div>

  <div class="preview-area">
    <iframe id="preview"></iframe>
  </div>
</div>

<!-- Splash Preview Overlay -->
<div id="splashPreview">
  <img id="splashIcon" src="" alt="App Icon">
  <div id="splashName"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
// Variabel
const html = document.getElementById('htmlCode');
const css  = document.getElementById('cssCode');
const js   = document.getElementById('jsCode');
const preview = document.getElementById('preview');
const tabs = document.querySelectorAll('.tab');
const appNameInput = document.getElementById('appName');
const iconInput = document.getElementById('appIcon');
const bgColorInput = document.getElementById('bgColor');
const themeColorInput = document.getElementById('themeColor');
const previewSplashBtn = document.getElementById('previewSplashBtn');
const downloadBtn = document.getElementById('downloadBtn');

const splashPreview = document.getElementById('splashPreview');
const splashIcon = document.getElementById('splashIcon');
const splashName = document.getElementById('splashName');

let iconBase64 = null;

// Ganti tab
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    html.style.display = css.style.display = js.style.display = 'none';
    document.getElementById(tab.dataset.lang + 'Code').style.display = 'block';
  });
});

// Live preview
function updatePreview() {
  const content = `
<!DOCTYPE html>
<html>
<head><style>${css.value}</style></head>
<body>${html.value}<script>${js.value}<\/script></body>
</html>`;
  preview.srcdoc = content;
}

[html, css, js, appNameInput].forEach(el => el.addEventListener('input', updatePreview));

// Upload icon
iconInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    iconBase64 = ev.target.result;
    splashIcon.src = iconBase64; // update preview icon juga
    alert('Icon diupload! Bisa langsung preview splash.');
  };
  reader.readAsDataURL(file);
});

// Preview Splash Simulation (Android-like)
previewSplashBtn.addEventListener('click', () => {
  if (!iconBase64) {
    alert('Upload icon dulu ya, biar splash terlihat keren!');
    return;
  }

  const bg = bgColorInput.value;
  const name = appNameInput.value.trim() || "My App";

  splashPreview.style.setProperty('--splash-bg', bg);
  splashIcon.src = iconBase64;
  splashName.textContent = name;

  splashPreview.classList.add('show');

  // Simulasi splash hilang setelah 3 detik (seperti transisi ke app)
  setTimeout(() => {
    splashPreview.style.opacity = '0';
    setTimeout(() => {
      splashPreview.classList.remove('show');
      splashPreview.style.opacity = '1';
    }, 600);
  }, 3000);
});

// Download ZIP (sama seperti sebelumnya, dengan splash support)
downloadBtn.addEventListener('click', async () => {
  const zip = new JSZip();
  const appName = appNameInput.value.trim() || "MyApp";
  const safeName = appName.replace(/[^a-z0-9]/gi, '').toLowerCase() || "myapp";
  const bgColor = bgColorInput.value;
  const themeColor = themeColorInput.value;

  let userHtml = html.value;

  if (!userHtml.includes('rel="manifest"')) {
    userHtml = userHtml.replace(/<head>/, `<head>\n  <link rel="manifest" href="manifest.json">\n  <meta name="theme-color" content="${themeColor}">`);
  }

  const splashMeta = `
  <!-- iOS Splash Screens -->
  <link rel="apple-touch-startup-image" href="splash.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="splash.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="splash.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="splash.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="splash.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="splash.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)">
  `;

  userHtml = userHtml.replace(/<\/head>/, `${splashMeta}\n</head>`);

  zip.file("index.html", userHtml);
  zip.file("style.css", css.value);
  zip.file("script.js", js.value);

  const manifest = {
    "name": appName,
    "short_name": appName.slice(0,12),
    "start_url": ".",
    "display": "standalone",
    "background_color": bgColor,
    "theme_color": themeColor,
    "icons": [
      { "src": "icon.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable" },
      { "src": "icon.png", "sizes": "192x192", "type": "image/png", "purpose": "any maskable" }
    ]
  };
  zip.file("manifest.json", JSON.stringify(manifest, null, 2));

  if (iconBase64) {
    const base64Data = iconBase64.split(',')[1];
    zip.file("icon.png", base64Data, {base64: true});
    zip.file("splash.png", base64Data, {base64: true});
  } else {
    const defaultIcon = "iVBORw0KGgoAAAANSUhEUgAAAgAAAAIACAYAAAAD0eNTAAAgAElEQVR4nO3BAQ0AAADCoPVP7WdsAAGmB7YAAQABBAEEAAQQBBAAEEAQ";
    zip.file("icon.png", defaultIcon, {base64: true});
    zip.file("splash.png", defaultIcon, {base64: true});
  }

  const sw = `
self.addEventListener('install', e => {
  e.waitUntil(caches.open('app-cache-v1').then(cache => cache.addAll(['./', 'index.html', 'style.css', 'script.js', 'icon.png', 'splash.png'])));
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(resp => resp || fetch(e.request)));
});
  `;
  zip.file("sw.js", sw);

  const blob = await zip.generateAsync({type:"blob"});
  saveAs(blob, `${safeName}-pwa.zip`);

  alert(`ZIP di-download!\n\nPreview Splash sudah bisa dipakai di editor ini.\nUntuk test splash asli:\n- Install PWA di HP (via "Add to home screen")\n- Buka app dari icon home → splash akan muncul otomatis`);
});

updatePreview();
</script>

</body>
</html>
