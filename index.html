
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Coding Website</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        textarea { width: 100%; height: 300px; font-family: monospace; }
        button { margin-top: 10px; padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <h1>Editor untuk Masukkan Coding HTML</h1>
    <p>Masukkan code HTML Anda di bawah ini, lalu klik tombol untuk simpan dan preview (akan muncul otomatis di Website 2 jika dibuka).</p>
    <textarea id="codeInput" placeholder="Tulis code HTML di sini..."></textarea>
    <button onclick="saveCode()">Simpan dan Preview</button>

    <script>
        function saveCode() {
            const code = document.getElementById('codeInput').value;
            localStorage.setItem('savedHTML', code);
            alert('Code disimpan! Buka Website 2 untuk melihat preview otomatis.');
        }

        // Muat code sebelumnya jika ada
        window.onload = function() {
            const savedCode = localStorage.getItem('savedHTML');
            if (savedCode) {
                document.getElementById('codeInput').value = savedCode;
            }
        };
    </script>
</body>
</html>
